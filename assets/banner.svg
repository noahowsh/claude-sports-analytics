<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2130"/>
      <stop offset="100%" stop-color="#141620"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151720"/>
      <stop offset="100%" stop-color="#0d0f15"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#0f1014"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="298" rx="15" fill="none" stroke="#1a1a1f" stroke-width="1"/>

  <!-- 3D Puck -->
  <g transform="translate(160, 120)">
    <!-- Side wall -->
    <path d="M-55,0 L-55,25 C-55,42 -30,55 0,55 C30,55 55,42 55,25 L55,0 C55,17 30,30 0,30 C-30,30 -55,17 -55,0Z" fill="url(#side)"/>
    <line x1="-55" y1="0" x2="-55" y2="25" stroke="#10b981" stroke-width="2.5" opacity="0.3"/>
    <line x1="55" y1="0" x2="55" y2="25" stroke="#10b981" stroke-width="2.5" opacity="0.3"/>
    <path d="M-55,25 C-55,42 -30,55 0,55 C30,55 55,42 55,25" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.3"/>
    <!-- Top face -->
    <ellipse cx="0" cy="0" rx="55" ry="27" fill="url(#face)" stroke="#10b981" stroke-width="3"/>
    <!-- API text -->
    <text x="0" y="9" text-anchor="middle" font-family="monospace" font-weight="900" font-size="26" fill="#10b981" letter-spacing="3">API</text>
  </g>

  <!-- Title -->
  <text x="290" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="52" fill="#fafafa" letter-spacing="-1">PuckAPI Skills</text>

  <!-- Subtitle -->
  <text x="290" y="155" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="20" fill="#a1a1aa">Turn Claude into a hockey analyst. 28 free skills for NHL</text>
  <text x="290" y="180" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="20" fill="#a1a1aa">analytics, betting models, and predictive modeling.</text>

  <!-- Category pills -->
  <rect x="290" y="205" width="130" height="28" rx="14" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="355" y="224" text-anchor="middle" font-family="monospace" font-size="12" fill="#10b981" font-weight="600">Data Explorer</text>

  <rect x="432" y="205" width="145" height="28" rx="14" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="504" y="224" text-anchor="middle" font-family="monospace" font-size="12" fill="#10b981" font-weight="600">Betting Models</text>

  <rect x="589" y="205" width="135" height="28" rx="14" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="656" y="224" text-anchor="middle" font-family="monospace" font-size="12" fill="#10b981" font-weight="600">ML Pipelines</text>

  <rect x="736" y="205" width="148" height="28" rx="14" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="810" y="224" text-anchor="middle" font-family="monospace" font-size="12" fill="#10b981" font-weight="600">Free &amp; Open Source</text>
</svg>
